<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GlassGen</title>

  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="styles.css" />
  <style id="dynamicStyles"></style>
</head>

<body>
  <main class="app">

    <!-- HERO -->
    <header class="hero">
      <div class="brand">
        <span class="brand-dot"></span>
        <span class="brand-name">GlassGen</span>
      </div>

      <h1 class="hero-title">
        Create <span class="hero-gradient">Glass Buttons</span> with CSS
      </h1>

      <p class="hero-subtitle">
        Customize reflections, blur and shadows instantly. Copy the CSS in one click.
      </p>

      <!-- PREVIEW BUTTON -->
      <div class="hero-preview">
        <div class="button-wrap">
          <button class="glass-btn" type="button" aria-label="Preview button">
            <span>Generate</span>
          </button>
          <div class="button-shadow"></div>
        </div>
      </div>
    </header>

    <!-- TOOL CARD -->
    <section class="tool-section">
      <div class="tool-card">
          <div class="controls">

            <div class="controls-tools">
              <label>
                Reflection Color:
                <input type="color" id="reflectionColor" value="#B4F0E6" />
                <span id="reflectionColorValue">#B4F0E6</span>
              </label>

              <label>
                Reflection Opacity:
                <input type="range" id="reflectionOpacity" min="0" max="1" step="0.01" value="0.15" />
                <span id="reflectionOpacityValue">0.15</span>
              </label>

              <label>
                Shadow Blur:
                <input type="range" id="shadowBlur" min="2" max="12" step="0.5" value="2" />
                <span id="shadowBlurValue">2px</span>
              </label>
            </div>

            <div class="code-panel">
              <div class="code-header">
                <div class="code-tabs">
                  <button class="tab-btn active" id="cssBtn" type="button">CSS</button>
                  <button class="tab-btn" id="htmlBtn" type="button">HTML</button>
                </div>
                
                <button class="copy-btn" id="copyBtn" type="button">Copy</button>
              </div>

              <div class="code-scroll">
                <pre class="code-block">
                  <code id="cssOutput" class="code-content active"></code>
                  <code id="htmlOutput" class="code-content"></code>
                </pre>
              </div>
            </div>

          </div>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="app-footer">
    <p>
      Developed by
      <a href="https://github.com/marilynsaravia" target="_blank" rel="noreferrer">Marilyn Saravia</a>
      ✌🏽 ·
      <a href="https://github.com/marilynsaravia/Glassmorphism-Generator" target="_blank" rel="noreferrer">Source</a>
    </p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
